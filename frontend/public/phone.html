<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>편해질지도 — 모바일 미리보기</title>
  <style>
    /* 시연 영상 녹화용: 흰 화면 정중앙에 모바일 뷰포트(390×844)만 띄운다 */
    html, body { height: 100%; margin: 0; }
    body { background: #fff; display: flex; align-items: center; justify-content: center; }
    .phone {
      width: 390px; height: 844px; max-height: 96vh; aspect-ratio: 390 / 844;
      border: 1px solid #e2e8f0; border-radius: 24px; overflow: hidden;
      box-shadow: 0 8px 40px rgb(15 23 42 / 10%);
    }
    .phone iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <div class="phone">
    <iframe src="/" title="편해질지도 모바일 화면" allow="geolocation"></iframe>
  </div>
</body>
</html>
